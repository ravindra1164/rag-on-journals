version: "1.0.0"

services:
  ollama:
    container_name: ollama
    image: ollama/ollama
    build:
      context: .
      dockerfile: DockerfileOllama
    ports:
      - "11434:11434"
    healthcheck:
      test: [ "CMD", "curl", "http://localhost:11434" ]
      start_period: 40s
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - ollama_data:/tmp/.ollama
      - ollama_data:/tmp/
      - ./pull_model.sh:/pull_model.sh
    networks:
      - app_network
      
  nginx:
    container_name: nginx
    build:
      context: .
      dockerfile: DockerfileNginx
    ports:
      - "8080:80"
    #depends_on:
      #ollama:
      #  condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: [ "CMD", "curl", "http://localhost:80" ]
      start_period: 40s
      interval: 30s
      timeout: 10s
      retries: 5
  
  mcpserver:
    container_name: mcpserver
    build:
      context: .
      dockerfile: mcp/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      nginx:
        condition: service_started
    networks:
      - app_network
      
  ragapp:
    container_name: ragapp
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ollama_data:/tmp/.ollama
    #environment:
    #  - OLLAMA_BASE_URL=http://ollama:11434
    #  - OLLAMA_MODEL=smollm2
    depends_on:
      nginx:
        condition: service_started
      #ollama:
      #  condition: service_healthy
      mcpserver:
        condition: service_started
    networks:
      - app_network
  
networks:
  app_network:
    driver: bridge

volumes:
  ollama_data: